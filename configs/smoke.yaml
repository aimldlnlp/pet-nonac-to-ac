seed: 2026

data:
  root: data
  shape: [32, 32, 32]
  train_cases: 8
  val_cases: 2
  test_cases: 2

train:
  batch_size: 2
  epochs: 8
  lr: 0.0003
  weight_decay: 0.00001
  num_workers: 0
  amp: true
  grad_clip: 1.0
  early_stop_patience: 4
  early_stop_min_delta: 0.0001

scheduler:
  enabled: true
  factor: 0.5
  patience: 2
  min_lr: 0.000001

loss:
  w_l1: 0.52
  w_grad: 0.10
  w_hi: 0.10
  w_topk: 0.10
  w_rel: 0.10
  w_log: 0.10
  w_peak: 0.10
  hi_threshold: 0.90
  hi_boost: 1.2
  roi_quantile: 0.99
  roi_min_voxels: 64
  peak_voxels: 16
  topk_frac: 0.01
  topk_min_voxels: 64
  rel_eps: 0.001
  log_alpha: 20.0

eval:
  suv_roi_quantile: 0.99
  suv_roi_min_voxels: 64
  suv_peak_voxels: 16

model:
  in_channels: 1
  out_channels: 1
  base_channels: 8

paths:
  checkpoint_dir: checkpoints
  calibration_path: checkpoints/calibration.json
  output_pred_dir: outputs/predictions
  report_dir: reports
